<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="quiz-header">
    <i class="fas fa-globe quiz-icon" style="color:#10b981;"></i>
    <h1>General Knowledge Quiz</h1>
    <p>Challenge your awareness of the world.</p>
</div>
<div class="quiz-info">

        <div class="info-card">
            <i class="fas fa-question-circle biology-color"></i>
            <h3>Questions</h3>
            <p>25</p>
        </div>

        <div class="info-card">
            <i class="fas fa-clock biology-color"></i>
            <h3>Duration</h3>
            <p>20 Min</p>
        </div>

        <div class="info-card">
            <i class="fas fa-signal biology-color"></i>
            <h3>Difficulty</h3>
            <p>Medium</p>
        </div>

    </div>


<div class="topics-card">
    <h2>Topics Covered</h2>

    <div class="topics">
        <span>History</span>
        <span>Geography</span>
        <span>Sports</span>
        <span>Politics</span>
        <span>Awards</span>
        <span>Culture</span>
    </div>
</div>

<button class="start-btn" onclick="location.href='gkquiz.html'">Start Quiz</button>
</body>
</html>
