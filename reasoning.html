<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="quiz-header">
    <i class="fas fa-puzzle-piece quiz-icon" style="color:#f59e0b;"></i>
    <h1>Reasoning Quiz</h1>
    <p>Test your logical and analytical thinking.</p>
</div>
<div class="quiz-info">

        <div class="info-card">
            <i class="fas fa-question-circle reasoning-color"></i>
            <h3>Questions</h3>
            <p>25</p>
        </div>

        <div class="info-card">
            <i class="fas fa-clock biology-color"></i>
            <h3>Duration</h3>
            <p>20 Min</p>
        </div>

        <div class="info-card">
            <i class="fas fa-signal biology-color"></i>
            <h3>Difficulty</h3>
            <p>Medium</p>
        </div>

    </div>

<div class="topics-card">
    <h2>Topics Covered</h2>

    <div class="topics">
        <span>Blood Relations</span>
        <span>Direction Sense</span>
        <span>Coding-Decoding</span>
        <span>Puzzles</span>
        <span>Series</span>
        <span>Logical Reasoning</span>
    </div>
</div>

<button class="start-btn" onclick="location.href='reasoningquiz.html'">Start Quiz</button>
</body>
</html>
