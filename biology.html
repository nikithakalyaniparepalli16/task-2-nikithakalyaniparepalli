<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Quiz</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="quiz-page">

    <div class="quiz-header">
        <i class="fas fa-leaf quiz-icon biology-icon"></i>

        <h1>Biology Quiz</h1>

        <p>
            Test your knowledge of living organisms and life sciences.
        </p>
    </div>

    <div class="quiz-info">

        <div class="info-card">
            <i class="fas fa-question-circle biology-color"></i>
            <h3>Questions</h3>
            <p>25</p>
        </div>

        <div class="info-card">
            <i class="fas fa-clock biology-color"></i>
            <h3>Duration</h3>
            <p>20 Min</p>
        </div>

        <div class="info-card">
            <i class="fas fa-signal biology-color"></i>
            <h3>Difficulty</h3>
            <p>Medium</p>
        </div>

    </div>

    <div class="topics-card">

        <h2>Topics Covered</h2>

        <div class="topics">

            <span>Cell Biology</span>
            <span>Human Body</span>
            <span>Genetics</span>
            <span>Botany</span>
            <span>Zoology</span>
            <span>Ecology</span>

        </div>

    </div>

    <button class="biology-btn" onclick="location.href='biologyquiz.html'">
        <i class="fas fa-play"></i>
        Start Quiz
    </button>

</div>

</body>
</html>
