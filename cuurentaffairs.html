<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Affairs Quiz</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="quiz-page">

    <div class="quiz-header">
        <i class="fas fa-newspaper quiz-icon"></i>

        <h1>Current Affairs Quiz</h1>

        <p>
            Stay updated with the latest national and international events.
        </p>
    </div>

    <div class="quiz-info">

        <div class="info-card">
            <i class="fas fa-question-circle"></i>
            <h3>Questions</h3>
            <p>20</p>
        </div>

        <div class="info-card">
            <i class="fas fa-clock"></i>
            <h3>Duration</h3>
            <p>15 Min</p>
        </div>

        <div class="info-card">
            <i class="fas fa-signal"></i>
            <h3>Difficulty</h3>
            <p>Medium</p>
        </div>

    </div>

    <div class="topics-card">

        <h2>Topics Covered</h2>

        <div class="topics">

            <span>Politics</span>
            <span>Sports</span>
            <span>Economy</span>
            <span>Science</span>
            <span>Technology</span>
            <span>International Affairs</span>

        </div>

    </div>

    <button class="start-btn" onclick="location.href='currentquiz.html'">
        <i class="fas fa-play"></i>
        Start Quiz
    </button>

</div>

</body>
</html>
